# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-added-large-files
    -   id: check-json
    -   id: check-merge-conflict
    -   id: check-symlinks
    -   id: check-toml
    -   id: debug-statements
    -   id: detect-private-key
    -   id: double-quote-string-fixer
    -   id: end-of-file-fixer
    -   id: name-tests-test
    -   id: requirements-txt-fixer
    -   id: sort-simple-yaml

-   repo: https://github.com/psf/black
    rev: 23.3.0
    hooks:
    -   id: black
        language_version: python3

-   repo: https://github.com/PyCQA/isort
    rev: 5.12.0
    hooks:
    -   id: isort
        args: ["--profile", "black"]

-   repo: https://github.com/PyCQA/flake8
    rev: 6.0.0
    hooks:
    -   id: flake8
        args: [--max-line-length=88, --extend-ignore=E203]

-   repo: https://github.com/PyCQA/pylint
    rev: v3.0.0a6
    hooks:
    -   id: pylint
        args: [--max-line-length=88, --disable=C0114,C0115,C0116,R0903,R0913,W0212,W0613]

-   repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.3.0
    hooks:
    -   id: mypy
        additional_dependencies: [types-openpyxl]

-   repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
    -   id: bandit
        args: [-c, pyproject.toml]
        additional_dependencies: ["bandit[toml]"]

-   repo: https://github.com/PyCQA/pydocstyle
    rev: 6.3.0
    hooks:
    -   id: pydocstyle
        args: [--ignore=D100,D101,D102,D103,D104,D105,D106,D107,D203,D213]

-   repo: https://github.com/PyCQA/pyupgrade
    rev: v3.4.0
    hooks:
    -   id: pyupgrade
        args: [--py36-plus]

-   repo: https://github.com/PyCQA/pyflakes
    rev: 3.0.1
    hooks:
    -   id: pyflakes

-   repo: https://github.com/PyCQA/pycodestyle
    rev: 2.10.0
    hooks:
    -   id: pycodestyle
        args: [--max-line-length=88, --extend-ignore=E203]