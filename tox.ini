[tox]
envlist = py36, py37, py38, py39, py310, py311, py312, lint, type, docs

[testenv]
deps =
    pytest
    pytest-cov
    pytest-mock
commands =
    pytest tests/ {posargs}

[testenv:lint]
deps =
    flake8
    pylint
    black
    isort
commands =
    flake8 bilingual_excel_sync tests
    pylint bilingual_excel_sync
    black --check bilingual_excel_sync tests
    isort --check-only bilingual_excel_sync tests

[testenv:type]
deps =
    mypy
    types-openpyxl
commands =
    mypy bilingual_excel_sync

[testenv:docs]
deps =
    sphinx
    sphinx-rtd-theme
commands =
    sphinx-build -b html docs/ docs/_build/html

[testenv:format]
deps =
    black
    isort
commands =
    black bilingual_excel_sync tests
    isort bilingual_excel_sync tests

[testenv:clean]
deps =
    coverage
commands =
    coverage erase
    rm -rf build dist *.egg-info __pycache__ .pytest_cache .coverage htmlcov

[testenv:build]
deps =
    build
    twine
commands =
    python -m build
    twine check dist/*

[testenv:publish]
deps =
    twine
commands =
    twine upload dist/*

[testenv:demo]
commands =
    python demo.py

[testenv:test-skill]
commands =
    python test_skill.py

[testenv:test-cases]
commands =
    python test_cases.py

[testenv:examples]
commands =
    python examples.py

[testenv:analyze]
commands =
    python scripts/bilingual_excel_sync.py analyze {posargs}

[testenv:convert]
commands =
    python scripts/bilingual_excel_sync.py convert {posargs}

[testenv:verify]
commands =
    python scripts/bilingual_excel_sync.py verify {posargs}

[flake8]
max-line-length = 88
extend-ignore = E203
exclude =
    .git,
    __pycache__,
    build,
    dist,
    *.egg-info,
    .tox,
    .venv,
    .eggs

[pylint]
max-line-length = 88
disable =
    C0114,
    C0115,
    C0116,
    R0903,
    R0913,
    W0212,
    W0613

[black]
line-length = 88
target-version = py36, py37, py38, py39, py310, py311, py312

[isort]
profile = black
line_length = 88
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true

[mypy]
python_version = 3.6
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true
strict_concatenation = true

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

[coverage:run]
source = bilingual_excel_sync
omit = tests/*, setup.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    pass
    class .*\\bProtocol\\):
    @\(abc\\.\)?abstractmethod